%YAML 1.2
---
$id: http://devicetree.org/schemas/clock/qcom,qcs615-videocc.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Qualcomm Video Clock & Reset Controller on QCS615

maintainers:
  - Taniya Das <quic_tdas@quicinc.com>

description: |
  Qualcomm video clock control module provides clocks, resets and power
  domains on QCS615 Qualcomm SoCs.

  See also:
    include/dt-bindings/clock/qcom,qcs615-videocc.h
    include/dt-bindings/clock/qcom,videocc-sm6150.h

properties:
  compatible:
    enum:
      - qcom,qcs615-videocc
      - qcom,sa6155-videocc
      - qcom,sm6150-videocc

  reg:
    maxItems: 1

  clocks:
    items:
      - description: Board XO source
      - description: Sleep clock source

  '#clock-cells':
    const: 1

  '#reset-cells':
    const: 1

  '#power-domain-cells':
    const: 1

required:
  - compatible
  - reg
  - clocks
  - '#clock-cells'
  - '#reset-cells'
  - '#power-domain-cells'

additionalProperties: false

examples:
  - |
    #include <dt-bindings/clock/qcom,rpmh.h>

    clock-controller@ab00000 {
      compatible = "qcom,qcs615-videocc";
      reg = <0xab00000 0x10000>;
      clocks = <&rpmhcc RPMH_CXO_CLK>,
               <&sleep_clk>;

      #clock-cells = <1>;
      #reset-cells = <1>;
      #power-domain-cells = <1>;
    };
...

